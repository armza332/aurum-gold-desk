<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AURUM — ห้องเทรดทอง AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/styles-desktop.css">
<link rel="stylesheet" href="css/connect.css">
</head>
<body>
<div id="app">

  <!-- window title bar (desktop) -->
  <div class="titlebar">
    <div class="lights"><span class="c1"></span><span class="c2"></span><span class="c3"></span></div>
    <div class="wtitle"><span class="dot"></span><b>AURUM</b><span class="wsub">— ห้องเทรดทอง AI</span></div>
    <div class="spacer"></div>
    <div class="wstat"><span class="seg lcd" id="winClock">--:--</span></div>
  </div>

  <!-- app header -->
  <div class="topbar">
    <div class="brand">
      <span class="bn">AURUM</span>
      <span class="bd">XAU AI Desk</span>
    </div>
    <div class="clockwrap"><span class="clk lcd" id="clock">21:58</span></div>
    <div class="spacer"></div>
    <div class="priceblock">
      <span class="plab">XAU/USD</span>
      <span id="priceWrap" class="up lcd"><span id="priceArrow">▲</span><span id="price">2348.20</span></span>
    </div>
    <div class="spacer"></div>
    <button class="connbtn" id="connBtn" data-connect><span class="cdot"></span><span id="connLabel">ยังไม่เชื่อมต่อ</span></button>
    <div class="pill idle" id="modePill">● ว่าง</div>
  </div>

  <div class="deskbody">
    <!-- left: room + pipeline + control -->
    <div class="leftpane">
      <div id="stage" data-screen-label="ห้องเทรด">
        <canvas id="room"></canvas>
        <div class="tip">แตะตัวละครเพื่อดูว่ากำลังทำอะไร</div>
        <div id="popup"></div>
      </div>
      <div class="pipewrap">
        <div id="pipeline"></div>
        <div class="phaseline">สถานะทีม: <b id="phaseLabel">ว่าง — เฝ้าตลาด</b></div>
      </div>
      <div class="controls">
        <button id="toggleBtn"><span class="bt">▶ จำลองสัญญาณเข้า</span><span class="bs">ดูทีมทำงานเป็นทอด ๆ</span></button>
      </div>
    </div>

    <!-- right: panels -->
    <div class="rightpane">
      <div id="feed">
        <div class="card pos flat" id="posCard"></div>
        <div class="card" id="decCard"></div>
        <div class="card" id="mktCard"></div>
        <div class="card" id="sumCard"></div>
        <div class="card" id="lesCard"></div>
        <div class="card">
          <div class="ctitle">ไทม์ไลน์เหตุการณ์</div>
          <div class="logwrap"><ul id="logList"></ul></div>
        </div>
        <div class="foot" id="footNote">โหมดจริง — รอเชื่อมต่อ EA</div>
      </div>
    </div>
  </div>

</div>

<!-- LAYER 1 (brain). Load order: config + bridge before sim/main; connect after bridge. -->
<script src="js/pixel.js"></script>
<script src="js/scene.js"></script>
<script src="js/config.js"></script>
<script src="js/agents.js"></script>
<script src="js/bridge.js"></script>
<script src="js/connect.js"></script>
<script src="js/sim.js"></script>
<script src="js/ui.js"></script>
<script src="js/news.js"></script>
<script src="js/main.js"></script>
<script>
  // mirror the in-app clock into the window title bar
  (function () {
    const a = document.getElementById('clock'), b = document.getElementById('winClock');
    if (a && b) new MutationObserver(() => b.textContent = a.textContent)
      .observe(a, { childList: true, characterData: true, subtree: true });
  })();
</script>
</body>
</html>
